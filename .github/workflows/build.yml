name: Build wheels (Windows/macOS/Linux)

on:
  workflow_dispatch:
  push:
    branches:
      - "**"
      - "!gh-pages"
    tags:
      - "v*"

jobs:
  build-wheels:
    name: Build wheels on ${{ matrix.os }} / Python ${{ matrix.python }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, windows-2022, macos-13]
        python: ["3.10"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          pip install build cibuildwheel

      - name: Configure MSVC (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          echo "Using MSVC provided by Visual Studio on windows-2022"

      - name: Set CIBW environment
        shell: bash
        run: |
          echo "CIBW_BUILD=cp310-*" >> $GITHUB_ENV
          echo "CIBW_SKIP=pp* *-musllinux_*" >> $GITHUB_ENV
          echo "CIBW_TEST_SKIP=*" >> $GITHUB_ENV
          echo "CIBW_ARCHS_LINUX=x86_64" >> $GITHUB_ENV
          echo "CIBW_ARCHS_MACOS=x86_64 arm64" >> $GITHUB_ENV
          echo "CIBW_ARCHS_WINDOWS=AMD64" >> $GITHUB_ENV

      - name: Build wheels
        env:
          CIBW_BUILD: ${{ env.CIBW_BUILD }}
          CIBW_SKIP: ${{ env.CIBW_SKIP }}
          CIBW_TEST_SKIP: ${{ env.CIBW_TEST_SKIP }}
          CIBW_ARCHS_LINUX: ${{ env.CIBW_ARCHS_LINUX }}
          CIBW_ARCHS_MACOS: ${{ env.CIBW_ARCHS_MACOS }}
          CIBW_ARCHS_WINDOWS: ${{ env.CIBW_ARCHS_WINDOWS }}
        run: |
          python -m cibuildwheel --output-dir wheelhouse

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-py${{ matrix.python }}
          path: wheelhouse/*.whl

      - name: Create platform bundle zip (repo + wheels)
        shell: python
        env:
          OS_NAME: ${{ matrix.os }}
          PY_VER: ${{ matrix.python }}
        run: |
          import os, sys
          from pathlib import Path
          import zipfile

          repo_root = Path('.')
          bundle_dir = Path('bundle_artifacts')
          bundle_dir.mkdir(exist_ok=True)

          safe_os = os.environ.get('OS_NAME', 'unknown').replace('\n','').replace('\r','').replace(':','-')
          py_ver = os.environ.get('PY_VER', '3.10').replace('.', '')
          zip_name = f"bundle-{safe_os}-py{py_ver}.zip"
          zip_path = bundle_dir / zip_name

          exclude_dirs = {'.git', '.mypy_cache', '.pytest_cache', '__pycache__', 'bundle_artifacts'}

          with zipfile.ZipFile(zip_path, 'w', zipfile.ZIP_DEFLATED) as zf:
            for path in repo_root.rglob('*'):
              # Skip excluded directories
              parts = set(path.parts)
              if parts & exclude_dirs:
                continue
              if path.is_file():
                zf.write(path, arcname=str(path))

          print(f"Created bundle: {zip_path}")

      - name: Upload platform bundle zip
        uses: actions/upload-artifact@v4
        with:
          name: bundle-${{ matrix.os }}-py${{ matrix.python }}
          path: bundle_artifacts/*.zip

  build-sdist:
    name: Build sdist
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Build sdist
        run: |
          python -m pip install --upgrade pip
          pip install build
          python -m build --sdist --outdir dist
      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz
